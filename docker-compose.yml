services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - /home/admin/polaris-data/db.sqlite3:/app/db.sqlite3
      - /home/admin/polaris-data/media:/app/media

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /home/admin/polaris-data/media:/media:ro

volumes:
  caddy_data:
  caddy_config:
